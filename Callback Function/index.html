<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Callback Function</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Callback Function</h1>

<div class="container">

  <input type="number" id="num1" class="form-control mb-2" placeholder="Enter number 1">
  <input type="number" id="num2" class="form-control mb-2" placeholder="Enter number 2">

  <div class="mb-3">
    <button class="btn btn-primary" onclick="calculate(add)">Add</button>
    <button class="btn btn-primary" onclick="calculate(subtract)">Subtraction</button>
    <button class="btn btn-primary" onclick="calculate(multiply)">Multiplication</button>
    <button class="btn btn-primary" onclick="calculate(divide)">Division</button>
  </div>

  <h3 id="result">Result: </h3>

</div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
